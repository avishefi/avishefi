name: Update README with latest blog posts

on:
  schedule:
    # Daily at 06:00 UTC. Rewrites the list between the BLOG-POST-LIST markers.
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    name: Sync latest posts into README
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://avishefi.com/blog/index.xml"
          max_post_count: 4
